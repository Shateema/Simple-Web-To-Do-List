<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Fatima Ahmad - CIS/STE/22/1153 -->
        <h1>🚀 Group To-Do List</h1>
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList"></ul>
        <button onclick="clearAll()" class="clear-btn">Clear All Tasks</button>

        //mustapha mukhtar sani cis/ste/22/1145

         Built by Group 18 • 2026
        </footer>
        //Aminu yahaya Abubakar  CIS/Ste/22/1156
        <button onclick="sortTasks()" class="clear-btn" style="background:#9b59b6; margin-top:8px;">Sort A-Z</button>
        //Hafsat Muhammad Khamis CIS/STE/22/1150
        <buttton onclick="markAllCompleted()" class="clear-btn" style="background:#27ae60; margin-top:8px;"> Mark All Completed</buttton>button>
    </div>

    <script src="script.js"></script>
</body>
</html>
