<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🚀 Group To-Do List</h1>
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList"></ul>
        <button onclick="clearAll()" class="clear-btn">Clear All Tasks</button>

        <footer style="text-align:center; margin-top:25px; color:#777; font-size:0.9em;">
         Built by Group 18 • 2026
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
